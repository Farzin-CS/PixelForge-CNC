name: Bug Report
description: Report a bug to help us improve PixelForge CNC
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open image...
        2. Select mode...
        3. Click Run...
  - type: input
    id: version
    attributes:
      label: PixelForge Version
      description: What version are you running?
  - type: dropdown
    id: mode
    attributes:
      label: Engraving Mode
      options: [3D Raster, 2D Contour, 2D Line Art]
  - type: textarea
    id: logs
    attributes:
      label: Console Output / Error Log
      render: shell
